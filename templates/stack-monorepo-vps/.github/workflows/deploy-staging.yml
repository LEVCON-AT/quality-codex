name: Deploy Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
        env:
          VITE_BASE_PATH: /
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}

      - name: Tar artifacts
        run: |
          tar -czf client-web.tar.gz -C packages/client-web/dist .
          tar -czf docs-wiki.tar.gz -C packages/docs-wiki/.vitepress/dist .
          tar -czf bridge.tar.gz -C packages/bridge/dist .

      - uses: actions/upload-artifact@v4
        with:
          name: build-staging
          path: |
            client-web.tar.gz
            docs-wiki.tar.gz
            bridge.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-staging

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to staging
        run: |
          rsync -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}" \
            client-web.tar.gz docs-wiki.tar.gz bridge.tar.gz \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/

          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            'cd /opt/__SLUG__-staging && bash infra/scripts/deploy.sh staging'

      - name: Smoketest
        run: curl -sf https://staging.__DOMAIN__/healthz | grep -q '"ok":true'

      - name: Notify
        if: failure()
        run: echo "Deploy failed — check logs"
