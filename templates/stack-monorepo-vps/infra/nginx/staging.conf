# Staging nginx config — analog zu prod.conf, aber:
# - Domain: staging.__DOMAIN__
# - Optional Basic-Auth zum Schutz
# - Robots: noindex

server {
    listen 80;
    server_name staging.__DOMAIN__ docs-staging.__DOMAIN__;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name staging.__DOMAIN__;

    ssl_certificate /etc/letsencrypt/live/staging.__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.__DOMAIN__/privkey.pem;
    ssl_protocols TLSv1.3;

    include snippets/security-headers.conf;

    add_header X-Robots-Tag "noindex, nofollow" always;

    # Optional: Basic Auth (htpasswd in /etc/nginx/.staging-htpasswd)
    # auth_basic "Staging";
    # auth_basic_user_file /etc/nginx/.staging-htpasswd;

    location / {
        root /var/www/__SLUG__-staging/client-web;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /healthz {
        proxy_pass http://127.0.0.1:3002/healthz;
        access_log off;
    }
}
