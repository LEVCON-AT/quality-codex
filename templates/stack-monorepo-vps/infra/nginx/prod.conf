# Production nginx config — replace __DOMAIN__ with project domain
# Include via /etc/nginx/sites-enabled/__SLUG__-prod

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__ www.__DOMAIN__ docs.__DOMAIN__;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__ www.__DOMAIN__;

    ssl_certificate /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    include snippets/security-headers.conf;

    # Body size limit
    client_max_body_size 10M;

    # App
    location / {
        root /var/www/__SLUG__/client-web;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600";
    }

    # API + WebSocket via Bridge
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Healthcheck (public)
    location /healthz {
        proxy_pass http://127.0.0.1:3001/healthz;
        access_log off;
    }
}

# Docs Wiki
server {
    listen 443 ssl http2;
    server_name docs.__DOMAIN__;

    ssl_certificate /etc/letsencrypt/live/docs.__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docs.__DOMAIN__/privkey.pem;
    ssl_protocols TLSv1.3;

    include snippets/security-headers.conf;

    location / {
        root /var/www/__SLUG__/docs-wiki;
        try_files $uri $uri/ /index.html;
    }
}
